<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Неоновий градієнт для тексту -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff3bac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffae;stop-opacity:1" />
    </linearGradient>

    <!-- Сітка 90-х у стилі synthwave -->
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ea;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ff00ea;stop-opacity:0.7" />
    </linearGradient>

    <!-- Неоновий glow фільтр -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="10" result="coloredBlur2"/>
      <feMerge>
        <feMergeNode in="coloredBlur2"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="8" result="coloredBlur2"/>
      <feMerge>
        <feMergeNode in="coloredBlur2"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Сонце 90-х -->
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffea00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff7b00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ea;stop-opacity:1" />
    </linearGradient>

    <clipPath id="sunClip">
      <rect x="0" y="0" width="1200" height="250"/>
    </clipPath>
  </defs>

  <!-- Темний фон -->
  <rect width="1200" height="500" fill="#0a0320"/>

  <!-- Зірки на фоні -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="80" cy="60" r="1.5"/>
    <circle cx="200" cy="100" r="1"/>
    <circle cx="350" cy="40" r="1.2"/>
    <circle cx="500" cy="80" r="1"/>
    <circle cx="700" cy="50" r="1.5"/>
    <circle cx="900" cy="90" r="1"/>
    <circle cx="1050" cy="30" r="1.3"/>
    <circle cx="1150" cy="120" r="1"/>
    <circle cx="150" cy="150" r="1"/>
    <circle cx="950" cy="160" r="1.2"/>
  </g>

  <!-- Синтвейв-сонце -->
  <g clip-path="url(#sunClip)">
    <circle cx="600" cy="240" r="140" fill="url(#sunGradient)" opacity="0.9"/>
    <!-- Горизонтальні лінії що ріжуть сонце -->
    <rect x="460" y="180" width="280" height="4" fill="#0a0320"/>
    <rect x="460" y="200" width="280" height="5" fill="#0a0320"/>
    <rect x="460" y="222" width="280" height="6" fill="#0a0320"/>
    <rect x="460" y="246" width="280" height="7" fill="#0a0320"/>
  </g>

  <!-- Синтвейв-сітка знизу -->
  <g stroke="#ff00ea" stroke-width="1.5" opacity="0.6">
    <!-- Горизонтальні лінії -->
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="445" x2="1200" y2="445"/>
    <line x1="0" y1="475" x2="1200" y2="475"/>
    <!-- Вертикальні лінії — перспектива -->
    <line x1="600" y1="400" x2="0" y2="500"/>
    <line x1="600" y1="400" x2="150" y2="500"/>
    <line x1="600" y1="400" x2="300" y2="500"/>
    <line x1="600" y1="400" x2="450" y2="500"/>
    <line x1="600" y1="400" x2="600" y2="500"/>
    <line x1="600" y1="400" x2="750" y2="500"/>
    <line x1="600" y1="400" x2="900" y2="500"/>
    <line x1="600" y1="400" x2="1050" y2="500"/>
    <line x1="600" y1="400" x2="1200" y2="500"/>
  </g>

  <!-- Лінія горизонту -->
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#00e5ff" stroke-width="2" filter="url(#cyanGlow)"/>

  <!-- Основний текст: MINI REQUEST SYSTEM -->
  <g filter="url(#neonGlow)">
    <text x="600" y="230"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="110"
          font-weight="900"
          font-style="italic"
          fill="url(#neonGradient)"
          text-anchor="middle"
          letter-spacing="4"
          stroke="#ff00ea"
          stroke-width="1.5">
      MINI REQUEST
    </text>
  </g>

  <g filter="url(#cyanGlow)">
    <text x="600" y="340"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="110"
          font-weight="900"
          font-style="italic"
          fill="url(#cyanGradient)"
          text-anchor="middle"
          letter-spacing="10"
          stroke="#00e5ff"
          stroke-width="1.5">
      SYSTEM
    </text>
  </g>

  <!-- Декоративні лінії біля тексту -->
  <g stroke="#ff00ea" stroke-width="2" filter="url(#neonGlow)">
    <line x1="80" y1="280" x2="180" y2="280"/>
    <line x1="1020" y1="280" x2="1120" y2="280"/>
  </g>
</svg>