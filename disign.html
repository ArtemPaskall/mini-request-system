<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Request System</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        /* USER THEME — pink/cyan synthwave */
        --bg: #0a0320;
        --bg-grad: radial-gradient(
          ellipse at top,
          #1a0540 0%,
          #0a0320 60%,
          #000 100%
        );
        --panel: rgba(20, 8, 50, 0.7);
        --border: #ff00ea;
        --accent-1: #ff00ea;
        --accent-2: #00e5ff;
        --text: #ffffff;
        --muted: #b39ddb;
        --grid: #ff00ea;
        --shadow: 0 0 20px #ff00ea, 0 0 40px rgba(255, 0, 234, 0.4);
        --shadow-cyan: 0 0 15px #00e5ff, 0 0 30px rgba(0, 229, 255, 0.4);
      }

      body.admin {
        /* ADMIN THEME — green/yellow hacker terminal 90s */
        --bg: #001200;
        --bg-grad: radial-gradient(
          ellipse at top,
          #003300 0%,
          #001200 60%,
          #000 100%
        );
        --panel: rgba(0, 30, 0, 0.75);
        --border: #00ff66;
        --accent-1: #00ff66;
        --accent-2: #ffea00;
        --text: #e0ffe0;
        --muted: #7fff7f;
        --grid: #00ff66;
        --shadow: 0 0 20px #00ff66, 0 0 40px rgba(0, 255, 102, 0.4);
        --shadow-cyan: 0 0 15px #ffea00, 0 0 30px rgba(255, 234, 0, 0.4);
      }

      html,
      body {
        height: 100%;
        font-family: "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
        transition:
          background 0.6s ease,
          color 0.6s ease;
      }

      body {
        background-image: var(--bg-grad);
        min-height: 100vh;
        position: relative;
      }

      /* Synthwave ground grid */
      body::before {
        content: "";
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40vh;
        background:
          linear-gradient(to bottom, transparent 0%, var(--bg) 90%),
          repeating-linear-gradient(
            90deg,
            transparent 0 60px,
            var(--grid) 60px 61px
          ),
          repeating-linear-gradient(
            0deg,
            transparent 0 40px,
            var(--grid) 40px 41px
          );
        transform: perspective(500px) rotateX(60deg);
        transform-origin: bottom;
        opacity: 0.35;
        pointer-events: none;
        z-index: 0;
        transition: all 0.6s ease;
      }

      /* Stars */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 60vh;
        background-image:
          radial-gradient(1px 1px at 10% 20%, #fff, transparent),
          radial-gradient(1px 1px at 30% 40%, #fff, transparent),
          radial-gradient(1px 1px at 50% 15%, #fff, transparent),
          radial-gradient(1px 1px at 70% 30%, #fff, transparent),
          radial-gradient(1px 1px at 85% 10%, #fff, transparent),
          radial-gradient(1px 1px at 20% 55%, #fff, transparent),
          radial-gradient(1px 1px at 60% 60%, #fff, transparent),
          radial-gradient(1px 1px at 90% 45%, #fff, transparent);
        pointer-events: none;
        z-index: 0;
        opacity: 0.9;
      }

      /* ==== HEADER ==== */
      header {
        position: relative;
        z-index: 10;
        padding: 22px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid var(--border);
        box-shadow:
          0 0 30px var(--border),
          inset 0 -20px 40px rgba(255, 0, 234, 0.1);
        background: rgba(10, 3, 32, 0.6);
        backdrop-filter: blur(8px);
        transition: all 0.6s ease;
      }

      body.admin header {
        background: rgba(0, 18, 0, 0.7);
        box-shadow:
          0 0 30px var(--border),
          inset 0 -20px 40px rgba(0, 255, 102, 0.12);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo-icon {
        width: 60px;
        height: 60px;
        border: 2px solid var(--accent-1);
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 28px;
        font-weight: 900;
        color: var(--accent-1);
        text-shadow: var(--shadow);
        box-shadow: var(--shadow);
        background: rgba(0, 0, 0, 0.5);
      }

      .logo-text {
        font-family: Impact, "Arial Black", sans-serif;
        font-style: italic;
        letter-spacing: 2px;
        line-height: 0.95;
      }

      .logo-text .line-1 {
        font-size: 28px;
        background: linear-gradient(
          90deg,
          var(--accent-1),
          #ff3bac,
          var(--accent-2)
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 8px var(--accent-1));
      }

      .logo-text .line-2 {
        font-size: 28px;
        color: var(--accent-2);
        text-shadow: var(--shadow-cyan);
        letter-spacing: 6px;
      }

      /* ==== TOGGLE ==== */
      .toggle-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .toggle-label {
        font-size: 13px;
        letter-spacing: 2px;
        font-weight: bold;
        color: var(--muted);
        text-transform: uppercase;
      }

      .toggle-label.active {
        color: var(--accent-1);
        text-shadow: var(--shadow);
      }

      .toggle {
        position: relative;
        width: 78px;
        height: 36px;
        border: 2px solid var(--accent-1);
        border-radius: 36px;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.6);
        box-shadow:
          var(--shadow),
          inset 0 0 10px rgba(0, 0, 0, 0.8);
        transition: all 0.4s ease;
      }

      .toggle-knob {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--accent-1);
        box-shadow:
          0 0 15px var(--accent-1),
          0 0 30px var(--accent-1);
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      }

      body.admin .toggle-knob {
        left: 45px;
        background: var(--accent-1);
        box-shadow:
          0 0 15px var(--accent-1),
          0 0 30px var(--accent-1);
      }

      /* ==== MAIN ==== */
      main {
        position: relative;
        z-index: 5;
        padding: 32px 40px 60px;
      }

      .view-title {
        font-family: Impact, "Arial Black", sans-serif;
        font-style: italic;
        font-size: 44px;
        letter-spacing: 4px;
        margin-bottom: 8px;
        color: var(--accent-2);
        text-shadow: var(--shadow-cyan);
        text-transform: uppercase;
      }

      .view-sub {
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 3px;
        margin-bottom: 32px;
        text-transform: uppercase;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
      }

      .column {
        background: var(--panel);
        border: 2px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow:
          var(--shadow),
          inset 0 0 30px rgba(0, 0, 0, 0.5);
        min-height: 500px;
        backdrop-filter: blur(4px);
        transition: all 0.6s ease;
      }

      .col-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 14px;
        margin-bottom: 16px;
        border-bottom: 1px dashed var(--accent-1);
      }

      .col-title {
        font-family: Impact, sans-serif;
        font-style: italic;
        font-size: 22px;
        letter-spacing: 3px;
        color: var(--accent-1);
        text-shadow: var(--shadow);
        text-transform: uppercase;
      }

      .col-count {
        background: var(--accent-1);
        color: #000;
        font-weight: 900;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 20px;
        box-shadow: var(--shadow);
        min-width: 28px;
        text-align: center;
      }

      /* Кольори колонок */
      .column.new {
        border-color: #00e5ff;
        box-shadow:
          0 0 20px #00e5ff,
          inset 0 0 30px rgba(0, 0, 0, 0.5);
      }
      .column.new .col-title {
        color: #00e5ff;
        text-shadow: 0 0 15px #00e5ff;
      }
      .column.new .col-count {
        background: #00e5ff;
        box-shadow: 0 0 15px #00e5ff;
      }
      .column.new .col-head {
        border-bottom-color: #00e5ff;
      }

      .column.progress {
        border-color: #ffea00;
        box-shadow:
          0 0 20px #ffea00,
          inset 0 0 30px rgba(0, 0, 0, 0.5);
      }
      .column.progress .col-title {
        color: #ffea00;
        text-shadow: 0 0 15px #ffea00;
      }
      .column.progress .col-count {
        background: #ffea00;
        box-shadow: 0 0 15px #ffea00;
      }
      .column.progress .col-head {
        border-bottom-color: #ffea00;
      }

      .column.done {
        border-color: #00ff66;
        box-shadow:
          0 0 20px #00ff66,
          inset 0 0 30px rgba(0, 0, 0, 0.5);
      }
      .column.done .col-title {
        color: #00ff66;
        text-shadow: 0 0 15px #00ff66;
      }
      .column.done .col-count {
        background: #00ff66;
        box-shadow: 0 0 15px #00ff66;
      }
      .column.done .col-head {
        border-bottom-color: #00ff66;
      }

      body.admin .column.new {
        border-color: #00e5ff;
      }
      body.admin .column.progress {
        border-color: #ff7b00;
        box-shadow:
          0 0 20px #ff7b00,
          inset 0 0 30px rgba(0, 0, 0, 0.5);
      }
      body.admin .column.progress .col-title {
        color: #ff7b00;
        text-shadow: 0 0 15px #ff7b00;
      }
      body.admin .column.progress .col-count {
        background: #ff7b00;
        box-shadow: 0 0 15px #ff7b00;
      }

      /* ==== CARDS ==== */
      .card {
        background: rgba(0, 0, 0, 0.55);
        border: 1.5px solid var(--accent-1);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 14px;
        cursor: grab;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 0 20px var(--accent-1);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--accent-1);
        box-shadow: 0 0 10px var(--accent-1);
      }

      .column.new .card {
        border-color: #00e5ff;
      }
      .column.new .card::before {
        background: #00e5ff;
        box-shadow: 0 0 10px #00e5ff;
      }
      .column.new .card:hover {
        box-shadow: 0 0 20px #00e5ff;
      }

      .column.progress .card {
        border-color: #ffea00;
      }
      .column.progress .card::before {
        background: #ffea00;
        box-shadow: 0 0 10px #ffea00;
      }
      .column.progress .card:hover {
        box-shadow: 0 0 20px #ffea00;
      }

      .column.done .card {
        border-color: #00ff66;
      }
      .column.done .card::before {
        background: #00ff66;
        box-shadow: 0 0 10px #00ff66;
      }
      .column.done .card:hover {
        box-shadow: 0 0 20px #00ff66;
      }

      .card-id {
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .card-title {
        font-size: 15px;
        font-weight: bold;
        color: var(--text);
        margin-bottom: 8px;
        font-family: "Courier New", monospace;
      }

      .card-desc {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
        margin-bottom: 10px;
      }

      .card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .tag {
        padding: 2px 8px;
        border: 1px solid var(--muted);
        border-radius: 3px;
        font-weight: bold;
      }

      .tag.hi {
        border-color: #ff0066;
        color: #ff0066;
        text-shadow: 0 0 5px #ff0066;
      }
      .tag.mid {
        border-color: #ffea00;
        color: #ffea00;
        text-shadow: 0 0 5px #ffea00;
      }
      .tag.low {
        border-color: #00ff66;
        color: #00ff66;
        text-shadow: 0 0 5px #00ff66;
      }

      .add-btn {
        width: 100%;
        margin-top: 8px;
        padding: 10px;
        background: transparent;
        border: 1.5px dashed var(--accent-1);
        color: var(--accent-1);
        font-family: "Courier New", monospace;
        font-weight: bold;
        letter-spacing: 2px;
        cursor: pointer;
        border-radius: 8px;
        font-size: 12px;
        transition: all 0.2s ease;
      }
      .add-btn:hover {
        background: var(--accent-1);
        color: #000;
        box-shadow: var(--shadow);
      }

      .column.new .add-btn {
        border-color: #00e5ff;
        color: #00e5ff;
      }
      .column.new .add-btn:hover {
        background: #00e5ff;
        color: #000;
        box-shadow: 0 0 20px #00e5ff;
      }

      .column.progress .add-btn {
        border-color: #ffea00;
        color: #ffea00;
      }
      .column.progress .add-btn:hover {
        background: #ffea00;
        color: #000;
        box-shadow: 0 0 20px #ffea00;
      }

      .column.done .add-btn {
        border-color: #00ff66;
        color: #00ff66;
      }
      .column.done .add-btn:hover {
        background: #00ff66;
        color: #000;
        box-shadow: 0 0 20px #00ff66;
      }

      /* Admin badge */
      .role-badge {
        padding: 6px 14px;
        font-size: 10px;
        letter-spacing: 3px;
        font-weight: 900;
        border: 2px solid var(--accent-1);
        color: var(--accent-1);
        text-shadow: var(--shadow);
        box-shadow: var(--shadow);
        border-radius: 4px;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.6);
      }

      /* Flicker animation */
      @keyframes flicker {
        0%,
        18%,
        22%,
        25%,
        53%,
        57%,
        100% {
          opacity: 1;
        }
        20%,
        24%,
        55% {
          opacity: 0.85;
        }
      }
      .logo-text .line-1,
      .logo-text .line-2 {
        animation: flicker 4s infinite;
      }

      @media (max-width: 900px) {
        .board {
          grid-template-columns: 1fr;
        }
        header {
          flex-direction: column;
          gap: 20px;
        }
        .view-title {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-icon">M</div>
        <div class="logo-text">
          <div class="line-1">MINI REQUEST</div>
          <div class="line-2">SYSTEM</div>
        </div>
      </div>

      <div class="toggle-wrap">
        <span class="toggle-label active" id="labelUser">USER</span>
        <div class="toggle" id="toggle">
          <div class="toggle-knob"></div>
        </div>
        <span class="toggle-label" id="labelAdmin">ADMIN</span>
        <div class="role-badge" id="roleBadge">USER MODE</div>
      </div>
    </header>

    <main>
      <h1 class="view-title" id="viewTitle">My Requests</h1>
      <p class="view-sub" id="viewSub">
        &gt;&gt; Tracking your submitted tickets
      </p>

      <div class="board" id="board"></div>
    </main>

    <script>
      const data = {
        user: {
          title: "My Requests",
          sub: ">> Tracking your submitted tickets",
          cards: {
            new: [
              {
                id: "REQ-007",
                title: "New printer needed",
                desc: "Printer on 3rd floor is broken, need replacement ASAP",
                date: "17 Apr",
                tag: "hi",
                tagLabel: "HIGH",
              },
              {
                id: "REQ-012",
                title: "VPN access for remote work",
                desc: "Need VPN credentials to work from home next week",
                date: "16 Apr",
                tag: "mid",
                tagLabel: "MEDIUM",
              },
            ],
            progress: [
              {
                id: "REQ-004",
                title: "Software license renewal",
                desc: "Adobe Creative Cloud license expires soon",
                date: "12 Apr",
                tag: "mid",
                tagLabel: "MEDIUM",
              },
            ],
            done: [
              {
                id: "REQ-001",
                title: "Laptop RAM upgrade",
                desc: "Upgraded from 8GB to 16GB — working smooth now",
                date: "05 Apr",
                tag: "low",
                tagLabel: "LOW",
              },
              {
                id: "REQ-002",
                title: "Email signature setup",
                desc: "New company-branded signature installed",
                date: "02 Apr",
                tag: "low",
                tagLabel: "LOW",
              },
            ],
          },
        },
        admin: {
          title: "Admin Panel",
          sub: ">> Managing all incoming requests · root@mrs:~$",
          cards: {
            new: [
              {
                id: "REQ-007",
                title: "New printer needed",
                desc: "From: Artem P. · Office 3F",
                date: "17 Apr",
                tag: "hi",
                tagLabel: "HIGH",
              },
              {
                id: "REQ-012",
                title: "VPN access for remote work",
                desc: "From: Olena K. · Marketing",
                date: "16 Apr",
                tag: "mid",
                tagLabel: "MEDIUM",
              },
              {
                id: "REQ-013",
                title: "Monitor replacement",
                desc: "From: Ivan D. · Dev team",
                date: "17 Apr",
                tag: "mid",
                tagLabel: "MEDIUM",
              },
              {
                id: "REQ-014",
                title: "Access to Jira project",
                desc: "From: Yulia M. · QA",
                date: "17 Apr",
                tag: "low",
                tagLabel: "LOW",
              },
            ],
            progress: [
              {
                id: "REQ-004",
                title: "Software license renewal",
                desc: "Assigned: IT Dept · Est: 2 days",
                date: "12 Apr",
                tag: "mid",
                tagLabel: "MEDIUM",
              },
              {
                id: "REQ-009",
                title: "Slack workspace migration",
                desc: "Assigned: Sysadmin · Est: 1 week",
                date: "14 Apr",
                tag: "hi",
                tagLabel: "HIGH",
              },
              {
                id: "REQ-011",
                title: "Office WiFi upgrade",
                desc: "Assigned: Networking · In progress",
                date: "15 Apr",
                tag: "hi",
                tagLabel: "HIGH",
              },
            ],
            done: [
              {
                id: "REQ-001",
                title: "Laptop RAM upgrade",
                desc: "Completed by: IT Dept",
                date: "05 Apr",
                tag: "low",
                tagLabel: "LOW",
              },
              {
                id: "REQ-002",
                title: "Email signature setup",
                desc: "Completed by: HR",
                date: "02 Apr",
                tag: "low",
                tagLabel: "LOW",
              },
              {
                id: "REQ-003",
                title: "Server backup restored",
                desc: "Completed by: Sysadmin",
                date: "28 Mar",
                tag: "hi",
                tagLabel: "HIGH",
              },
            ],
          },
        },
      };

      const columns = [
        { key: "new", title: "New", cls: "new" },
        { key: "progress", title: "In Process", cls: "progress" },
        { key: "done", title: "Done", cls: "done" },
      ];

      let currentRole = "user";

      function render() {
        const info = data[currentRole];
        document.getElementById("viewTitle").textContent = info.title;
        document.getElementById("viewSub").textContent = info.sub;
        document.getElementById("roleBadge").textContent =
          currentRole.toUpperCase() + " MODE";

        document
          .getElementById("labelUser")
          .classList.toggle("active", currentRole === "user");
        document
          .getElementById("labelAdmin")
          .classList.toggle("active", currentRole === "admin");

        const board = document.getElementById("board");
        board.innerHTML = "";

        columns.forEach((col) => {
          const cards = info.cards[col.key] || [];
          const colEl = document.createElement("div");
          colEl.className = "column " + col.cls;
          colEl.innerHTML = `
        <div class="col-head">
          <div class="col-title">${col.title}</div>
          <div class="col-count">${cards.length}</div>
        </div>
        <div class="col-cards">
          ${cards
            .map(
              (c) => `
            <div class="card">
              <div class="card-id">${c.id}</div>
              <div class="card-title">${c.title}</div>
              <div class="card-desc">${c.desc}</div>
              <div class="card-meta">
                <span>${c.date}</span>
                <span class="tag ${c.tag}">${c.tagLabel}</span>
              </div>
            </div>
          `,
            )
            .join("")}
        </div>
        <button class="add-btn">+ ADD REQUEST</button>
      `;
          board.appendChild(colEl);
        });
      }

      document.getElementById("toggle").addEventListener("click", () => {
        currentRole = currentRole === "user" ? "admin" : "user";
        document.body.classList.toggle("admin", currentRole === "admin");
        render();
      });

      render();
    </script>
  </body>
</html>
